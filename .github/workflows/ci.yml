name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Node install + syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (node --check op alle .js, excl. node_modules)
        run: |
          set -e
          git ls-files '*.js' ':!:node_modules/**' | while read -r f; do
            node --check "$f"
          done
